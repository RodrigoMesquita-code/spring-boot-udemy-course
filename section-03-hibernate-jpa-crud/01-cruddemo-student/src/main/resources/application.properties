spring.application.name=cruddemo
spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker?useSSL=false&serverTimezone=UTC
spring.datasource.username=springstudent
spring.datasource.password=springstudent
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Turn off the spring boot banner
spring.main.banner-mode=off

# Reduce logging level. Set logging level to warn
logging.level.root=warn

# Add logging configs to display SQL statements
logging.level.org.hibernate.SQL=debug
logging,level.org.hibernate.orm.jdbc.bind

# Configure JPA/Hibernate to auto create the tables "=create"
# The "update"config will keep existing data in the table
spring.jpa.hibernate.ddl-auto=update
